name: conda-release

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+*']

jobs:
  build-and-upload:
    name: build + upload to anaconda.org
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Assert tag matches version.py
        run: |
          V=$(python -c "exec(open('version.py').read()); print(__version__)")
          if [ "$V" != "$GITHUB_REF_NAME" ]; then
            echo "::error::version.py ($V) does not match tag ($GITHUB_REF_NAME)"
            exit 1
          fi
          echo "tag matches version.py: $V"

      - name: Set up miniforge / mamba
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          auto-update-conda: false
          use-mamba: true
          activate-environment: release
          python-version: "3.11"
          channels: conda-forge,bioconda,petrnovak
          channel-priority: strict

      - name: Install build + runtime tooling
        run: |
          mamba install -y conda-build boa anaconda-client
          # Install the runtime deps so we can also run the long test
          mamba install -y --file requirements.txt

      - name: Long test (release gate)
        run: ./tests.sh long

      - name: Build conda package
        env:
          PKG_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p build_out
          echo "building dante_ltr version '$PKG_VERSION'"
          conda mambabuild -c conda-forge -c bioconda -c petrnovak \
            --output-folder build_out \
            conda/dante_ltr

      - name: Upload to anaconda.org
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          if [ -z "${ANACONDA_API_TOKEN:-}" ]; then
            echo "::error::ANACONDA_API_TOKEN secret is not set"
            exit 1
          fi
          # noarch package lives under build_out/noarch/
          FILES=$(ls build_out/noarch/dante_ltr-*.tar.bz2 \
                     build_out/noarch/dante_ltr-*.conda 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "::error::no built package found in build_out/noarch/"
            exit 1
          fi
          for f in $FILES; do
            echo "Uploading $f"
            anaconda -t "$ANACONDA_API_TOKEN" upload \
              --user petrnovak \
              --label main \
              "$f"
          done

      - name: Upload build artefact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dante_ltr-${{ github.ref_name }}
          path: build_out/noarch/dante_ltr-*
          if-no-files-found: ignore
